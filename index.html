<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerçek Zamanlı Sistem Monitörü</title>
  <style>
    body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 60px; }
    .card { background: #1e1e1e; border-radius: 15px; padding: 30px; display: inline-block; margin: 15px; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2); min-width: 250px; }
    h1 { color: #00ff88; margin-bottom: 50px; }
    h2 { color: #aaaaaa; font-weight: normal; margin-top: 0; }
    .value { font-size: 60px; font-weight: bold; margin: 10px 0; color: #00bcd4; }
    .unit { font-size: 24px; color: #777777; }
    .status { color: #ff9800; font-weight: bold; margin-top: 30px; font-size: 14px; }
  </style>
  <script>
// BULUT BAĞLANTISI: Firebase URL adresinizi buraya yazın (Sonunda / olmadan)
    const firebaseDatabaseURL = "https://bitirme-86bd2-default-rtdb.europe-west1.firebasedatabase.app";

    setInterval(function() {
      // Önbelleğe (Cache) takılmamak için URL sonuna zaman parametresi ekliyoruz
      fetch(firebaseDatabaseURL + '/veri.json?nocache=' + new Date().getTime())
        .then(response => response.json())
        .then(data => {
          if(data && data.ts) {
            let suAnkiZaman = new Date().getTime();
            let fark = suAnkiZaman - data.ts;

            // Eğer Firebase'deki verinin üzerinden 4 saniyeden (4000ms) fazla geçmişse
            if (fark > 4000) {
              document.getElementById('durum').innerText = "○ CİHAZ ÇEVRİMDIŞI (GÜÇ YOK)";
              document.getElementById('durum').style.color = "#f44336"; // Kırmızı uyarı
              document.getElementById('voltaj').innerText = "---";
              document.getElementById('akim').innerText = "---";
            } 
            // Eğer cihaz sürekli güncel veri basıyorsa
            else {
              document.getElementById('voltaj').innerText = data.v.toFixed(2);
              document.getElementById('akim').innerText = data.a.toFixed(2);
              document.getElementById('durum').innerText = "● BAĞLANTI AKTİF";
              document.getElementById('durum').style.color = "#00ff88"; // Yeşil
            }
          }
        })
        .catch(error => {
          document.getElementById('durum').innerText = "○ BULUT BAĞLANTI HATASI";
          document.getElementById('durum').style.color = "#f44336";
        });
    }, 500);
  </script>
</head>
<body>
  <h1>⚡ Gerçek Zamanlı Sistem Monitörü</h1>
  
  <div class="card">
    <h2>Hat Voltajı</h2>
    <div class="value"><span id="voltaj">0.00</span><span class="unit"> V</span></div>
  </div>
  
  <div class="card">
    <h2>Çekilen Akım</h2>
    <div class="value"><span id="akim">0.00</span><span class="unit"> mA</span></div>
  </div>

  <div id="durum" class="status">● SİSTEM BEKLENİYOR</div>
</body>
</html>
